{% extends "account/base.html" %}

{% block title %}Sign out | YAMLconfig{% endblock %}

{% block account_content %}
	<h1 class="text-2xl font-semibold text-slate-900">Sign out</h1>
	<p class="mt-2 text-sm text-slate-600">Are you sure you want to sign out?</p>

	<form method="post" action="{% url 'account_logout' %}" class="mt-6 flex gap-3">
		{% csrf_token %}
		{{ redirect_field }}
		<button type="submit" class="rounded-md bg-slate-900 px-4 py-2 text-sm font-semibold text-white hover:bg-slate-700">Sign out</button>
		<a href="{% url 'generator:project_list' %}" class="rounded-md border border-slate-300 px-4 py-2 text-sm font-medium text-slate-700 hover:bg-slate-50">Cancel</a>
	</form>
{% endblock %}
