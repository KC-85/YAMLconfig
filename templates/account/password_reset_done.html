{% extends "account/base.html" %}

{% block title %}Reset email sent | YAMLconfig{% endblock %}

{% block account_content %}
	<h1 class="text-2xl font-semibold text-slate-900">Check your email</h1>
	<p class="mt-2 text-sm text-slate-600">If an account exists for that address, a password-reset message is on its way.</p>
	<a href="{% url 'account_login' %}" class="mt-6 inline-flex rounded-md bg-slate-900 px-4 py-2 text-sm font-semibold text-white hover:bg-slate-700">Back to sign in</a>
{% endblock %}
