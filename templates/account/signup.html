{% extends "account/base.html" %}

{% block title %}Sign up | YAMLconfig{% endblock %}

{% block account_content %}
	<h1 class="text-2xl font-semibold text-slate-900">Create your account</h1>
	<p class="mt-1 text-sm text-slate-600">
		Already registered?
		<a href="{% url 'account_login' %}" class="font-medium text-cyan-700 hover:text-cyan-800">Sign in</a>.
	</p>

	<form method="post" action="{% url 'account_signup' %}" class="mt-6 space-y-4">
		{% csrf_token %}
		{% include "account/_form_fields.html" %}
		{{ redirect_field }}
		<button type="submit" class="inline-flex w-full items-center justify-center rounded-md bg-cyan-600 px-4 py-2 text-sm font-semibold text-white hover:bg-cyan-700">Create account</button>
	</form>
{% endblock %}
