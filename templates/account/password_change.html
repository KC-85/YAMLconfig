{% extends "account/base.html" %}

{% block title %}Change password | YAMLconfig{% endblock %}

{% block account_content %}
	<h1 class="text-2xl font-semibold text-slate-900">Change password</h1>
	<p class="mt-1 text-sm text-slate-600">Choose a new password for your account.</p>

	<form method="post" action="{% url 'account_change_password' %}" class="mt-6 space-y-4">
		{% csrf_token %}
		{% include "account/_form_fields.html" %}
		{{ redirect_field }}
		<button type="submit" class="rounded-md bg-cyan-600 px-4 py-2 text-sm font-semibold text-white hover:bg-cyan-700">Update password</button>
	</form>
{% endblock %}
