{% extends "account/base.html" %}

{% block title %}Sign in | YAMLconfig{% endblock %}

{% block account_content %}
	<h1 class="text-2xl font-semibold text-slate-900">Sign in</h1>
	<p class="mt-1 text-sm text-slate-600">
		New here?
		<a href="{% url 'account_signup' %}" class="font-medium text-cyan-700 hover:text-cyan-800">Create an account</a>.
	</p>

	<form method="post" action="{% url 'account_login' %}" class="mt-6 space-y-4">
		{% csrf_token %}
		{% include "account/_form_fields.html" %}
		{{ redirect_field }}
		<button type="submit" class="inline-flex w-full items-center justify-center rounded-md bg-slate-900 px-4 py-2 text-sm font-semibold text-white hover:bg-slate-700">Sign in</button>
	</form>

	<p class="mt-4 text-center text-sm">
		<a href="{% url 'account_reset_password' %}" class="text-slate-700 underline hover:text-slate-900">Forgot your password?</a>
	</p>
{% endblock %}
